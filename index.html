}

.logo img {

    height: 100%;
    object-fit: cover;
}

        nav a {

            text-decoration: none;
            margin-left: 25px;

        }

        .puchu {

            align-items: center;
            gap: 80px;
            flex-wrap: wrap;
        }

        }

            margin-bottom: 15px;
        }

        .hero-text span {
            background: linear-gradient(90deg, #38bdf8, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-text puchuuuu {

        .barud {

            margin-bottom: 40px;
            font-size: 40px;
        }

        .years {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .year {
            background: rgba(255, 255, 255, .08);
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #38bdf8;
            transition: .4s;
        }

        .year:hover {

            box-shadow: 0 0 20px rgba(56, 189, 248, .5);
        }

        .year h3 {
            margin-bottom: 15px;
        }
